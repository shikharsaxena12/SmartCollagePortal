{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">

</head>
<body>

<!-- Navbar -->

<div class="navbar">
    <h2>Smart College Portal</h2>

    <div class="user">
        Welcome {{ request.user.first_name }}
        <a href="{% url 'logout' %}" class="logout">Logout</a>
    </div>
</div>


<!-- Sidebar -->

<div class="sidebar">

    <a href="#">Dashboard</a>
    <a href="#">Profile</a>
    <a href="#">Courses</a>
    <a href="#">Assignments</a>
    <a href="#">Results</a>
    <a href="#">Settings</a>

</div>


<!-- Main Content -->

<div class="content">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Profile</h3>
<p>Manage your profile.</p>
</div>

<div class="card">
<h3>Courses</h3>
<p>View your courses.</p>
</div>

<div class="card">
<h3>Assignments</h3>
<p>Submit assignments.</p>
</div>

<div class="card">
<h3>Results</h3>
<p>Check your results.</p>
</div>

</div>

</div>

</body>
</html>
